dataset: stnet
data_dir: data/stnet
n_genes: 250
n_patients: 23
cv_strategy: 8fold_patient_stratified

model:
  d_model: 512
  n_genes: 250

  # Per-dataset hyperparameters from TRIPLEX paper Table 14 (STNet = BC2):
  target_encoder: {}

  neighbor_encoder:
    depth: 4        # depth3 for BC2
    num_heads: 8    # num_heads3 for BC2
    mlp_ratio: 4    # mlp_ratio3 for BC2
    dropout: 0.1    # dropout3 for BC2

  global_encoder:
    depth: 3        # depth2 for BC2
    num_heads: 8    # num_heads2 for BC2
    mlp_ratio: 2    # mlp_ratio2 for BC2
    dropout: 0.1    # dropout2 for BC2

  fusion_layer:
    depth: 3        # depth1 for BC2
    num_heads: 16   # num_heads1 for BC2
    mlp_ratio: 4    # mlp_ratio1 for BC2
    dropout: 0.4    # dropout1 for BC2

training:
  seed: 2021
  max_epochs: 200
  early_stopping_patience: 20
  early_stopping_metric: pcc_m
  optimizer: adam
  lr: 0.0001
  scheduler: step_lr
  step_size: 50
  gamma: 0.9
  batch_size: 128
  mixed_precision: true
  alpha: 0.5

mcspr:
  enabled: false
  n_modules: 15
  n_contexts: 6
  k_min: 30.0
  tau: 1.0e-6
  beta: 0.9
  lambda_max: 0.1
  warmup_epochs: 5
  ramp_epochs: 10
  attachment_point: fusion
