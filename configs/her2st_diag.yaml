# L_norm vs L_MSE diagnostic config (fold 0 only, MCSPR off, 50 epochs fixed).
# Differs from her2st.yaml only in: max_epochs, early_stopping_patience.
# Loss function is toggled via --use_normalized_mse CLI flag on run_triplex.py.

dataset: her2st
data_dir: data/her2st
n_genes: 300
n_patients: 8
cv_strategy: lopcv

model:
  d_model: 512
  n_genes: 300

  target_encoder: {}

  neighbor_encoder:
    depth: 3
    num_heads: 16
    mlp_ratio: 1
    dropout: 0.3

  global_encoder:
    depth: 3
    num_heads: 16
    mlp_ratio: 4
    dropout: 0.1

  fusion_layer:
    depth: 1
    num_heads: 4
    mlp_ratio: 4
    dropout: 0.2

  histogene:
    n_layers: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.2
    use_grad_checkpoint: true
    cnn_chunk_size: 128

training:
  seed: 2021
  max_epochs: 50            # fixed budget — no early stopping for paired comparison
  early_stopping_patience: 999   # > max_epochs → never triggers
  early_stopping_metric: pcc_m
  optimizer: adam
  lr: 0.0001
  scheduler: step_lr
  step_size: 50
  gamma: 0.9
  batch_size: 128
  mixed_precision: true
  alpha: 0.5
  num_workers: 0
  pin_memory: false
  histogene_max_spots: 512
  histogene_val_max_spots: 712
  use_normalized_mse: false   # overridden by --use_normalized_mse CLI flag

mcspr:
  enabled: false            # diagnostic isolates L_norm from MCSPR
  n_modules: 15
  n_contexts: 6
  k_min: 30.0
  tau: 1.0e-6
  beta: 0.9
  lambda_max: 0.0
  warmup_epochs: 0
  ramp_epochs: 0
  attachment_point: fusion
