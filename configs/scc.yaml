dataset: scc
data_dir: data/scc
n_genes: 250
n_patients: 4
cv_strategy: lopcv

model:
  d_model: 512
  n_genes: 250

  # Per-dataset hyperparameters from TRIPLEX paper Table 14 (SCC):
  target_encoder: {}

  neighbor_encoder:
    depth: 4        # depth3 for SCC
    num_heads: 16   # num_heads3 for SCC
    mlp_ratio: 1    # mlp_ratio3 for SCC
    dropout: 0.3    # dropout3 for SCC

  global_encoder:
    depth: 2        # depth2 for SCC
    num_heads: 16   # num_heads2 for SCC
    mlp_ratio: 1    # mlp_ratio2 for SCC
    dropout: 0.1    # dropout2 for SCC

  fusion_layer:
    depth: 2        # depth1 for SCC
    num_heads: 8    # num_heads1 for SCC
    mlp_ratio: 4    # mlp_ratio1 for SCC
    dropout: 0.1    # dropout1 for SCC

training:
  seed: 2021
  max_epochs: 200
  early_stopping_patience: 20
  early_stopping_metric: pcc_m
  optimizer: adam
  lr: 0.0001
  scheduler: step_lr
  step_size: 50
  gamma: 0.9
  batch_size: 128
  mixed_precision: true
  alpha: 0.5

mcspr:
  enabled: false
  n_modules: 15
  n_contexts: 6
  k_min: 30.0
  tau: 1.0e-6
  beta: 0.9
  lambda_max: 0.1
  warmup_epochs: 5
  ramp_epochs: 10
  attachment_point: fusion
