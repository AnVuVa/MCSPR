dataset: her2st
data_dir: data/her2st
n_genes: 300
n_patients: 8
n_folds: 4          # spec v2: patient-paired 4-fold LOPCV (A,B | C,D | E,F | G,H)
cv_strategy: lopcv

model:
  d_model: 512
  n_genes: 300

  # Per-dataset hyperparameters from TRIPLEX paper Table 14 (HER2ST = BC1):
  target_encoder: {}  # no hyperparams needed

  neighbor_encoder:
    depth: 3        # depth3 for BC1
    num_heads: 16   # num_heads3 for BC1
    mlp_ratio: 1    # mlp_ratio3 for BC1
    dropout: 0.3    # dropout3 for BC1

  global_encoder:
    depth: 3        # depth2 for BC1
    num_heads: 16   # num_heads2 for BC1
    mlp_ratio: 4    # mlp_ratio2 for BC1
    dropout: 0.1    # dropout2 for BC1

  fusion_layer:
    depth: 1        # depth1 for BC1
    num_heads: 4    # num_heads1 for BC1
    mlp_ratio: 4    # mlp_ratio1 for BC1
    dropout: 0.2    # dropout1 for BC1

  histogene:
    n_layers: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.2
    use_grad_checkpoint: true   # recompute activations on backward — frees ~1.5 GB
    cnn_chunk_size: 128         # patch CNN chunk to bound peak memory

training:
  seed: 2021
  max_epochs: 200
  early_stopping_patience: 20
  early_stopping_metric: pcc_m
  optimizer: adam
  lr: 0.0001
  scheduler: step_lr
  step_size: 50
  gamma: 0.9
  batch_size: 256        # spec v2 confirmed 2026-04-22 (peak 8059 MiB at fold 0, 50% headroom)
  mixed_precision: true
  alpha: 0.5
  num_workers: 0
  pin_memory: false
  # HisToGene-specific whole-slide cap. Train hits backward (activations);
  # val runs under no_grad so can be larger.
  histogene_max_spots: 256        # 512 OOMed on backward even with grad_checkpoint (RTX 5070 Ti 16GB, WSL2); 256 is safer. OOM guard retries 192→128→64 if needed.
  histogene_val_max_spots: 712  # HER2ST max slide size
  # L_norm toggle: when true, TRIPLEX reconstruction MSE is replaced by
  # NormalizedMSELoss(gene_var) loaded from data/her2st/nmf/fold_{i}/gene_var.npy.
  # MCSPR term (if enabled) is unchanged and additive on top.
  use_normalized_mse: false

mcspr:
  enabled: false          # set true for TRIPLEX_MCSPR run
  n_modules: 10           # spec v2: smallest N_MODULES passing R²≥0.60 on all 4 folds
  n_contexts: 6
  k_min: 30.0
  tau: 1.0e-6
  beta: 0.9
  lambda_max: 0.10         # overridden at runtime by selected_lambda.json; kept in sync for clarity
  warmup_epochs: 0         # constant-lambda protocol (Apr 19 2026): no warmup
  ramp_epochs: 0           # constant-lambda protocol: no ramp-in
  attachment_point: fusion   # which prediction head Y_hat comes from
